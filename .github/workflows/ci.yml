name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Unit suite
        run: bundle exec rake spec
      - name: Independent security suite
        run: bundle exec rake spec:security

  live:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Live conformance
        env:
          API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
        run: |
          if [ -z "$API2CONVERT_API_KEY" ]; then
            echo "API2CONVERT_API_KEY not set; skipping live conformance."
            exit 0
          fi
          bundle exec rake spec:live
